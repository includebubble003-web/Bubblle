<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>{% block title %}Bubblle{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/app.css' %}" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="/">Bubblle</a>
        <span class="badge" id="whoami" hidden></span>
      </header>
      <main class="main">{% block content %}{% endblock %}</main>
    </div>
    {% block scripts %}{% endblock %}
  </body>
</html>
