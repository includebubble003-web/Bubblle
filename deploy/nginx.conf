# Bubblle — Nginx reverse proxy for Daphne (ASGI: HTTP + WebSockets)
#
# Usage:
#   Bare metal: set upstream to 127.0.0.1:8000 (Daphne listening there).
#   Docker: put this in an nginx service on the same Compose network and use
#            upstream server name:port, e.g.  web:8000
#
# TLS: terminate TLS here (recommended) or at a cloud load balancer. Uncomment
#      the second server block and fix certificate paths.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # WebSocket upgrade (required for Django Channels)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream bubblle_asgi {
        # Change to match where Daphne runs:
        #   127.0.0.1:8000     — Daphne on same host
        #   web:8000           — Docker Compose service name + internal port
        server 127.0.0.1:8000;
        keepalive 32;
    }

    # HTTP — redirect to HTTPS in production (uncomment return when TLS is ready)
    server {
        listen 80;
        # server_name your-domain.com;
        server_name _;

        client_max_body_size 2m;

        # return 301 https://$host$request_uri;

        location / {
            proxy_pass http://bubblle_asgi;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSockets (Channels)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Long-lived connections (typing, idle chat)
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_connect_timeout 75s;

            # Do not buffer SSE/WS bodies
            proxy_buffering off;
        }
    }

    # HTTPS — uncomment and set paths after you have certificates (e.g. certbot)
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    #     include /etc/letsencrypt/options-ssl-nginx.conf;
    #     ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    #
    #     client_max_body_size 2m;
    #
    #     # Allow Geolocation in the browser (avoid empty / deny from defaults)
    #     add_header Permissions-Policy "geolocation=(self), microphone=(), camera=()" always;
    #
    #     location / {
    #         proxy_pass http://bubblle_asgi;
    #         proxy_http_version 1.1;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto https;
    #         proxy_set_header Upgrade $http_upgrade;
    #         proxy_set_header Connection $connection_upgrade;
    #         proxy_read_timeout 86400s;
    #         proxy_send_timeout 86400s;
    #         proxy_connect_timeout 75s;
    #         proxy_buffering off;
    #     }
    # }
}
