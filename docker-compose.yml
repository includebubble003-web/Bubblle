services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bubblle}
      POSTGRES_USER: ${POSTGRES_USER:-bubblle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bubblle}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bubblle} -d ${POSTGRES_DB:-bubblle}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    env_file:
      - .env
    command: >
      sh -c "python manage.py migrate --noinput &&
             daphne -b 0.0.0.0 -p 8000 bubblle.asgi:application"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-insecure-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1},web
      POSTGRES_DB: ${POSTGRES_DB:-bubblle}
      POSTGRES_USER: ${POSTGRES_USER:-bubblle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bubblle}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      SESSION_COOKIE_SECURE: "0"
      # OPENAI_* come from env_file (.env) — do not override with empty ${OPENAI_API_KEY:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  expiry-worker:
    build: .
    env_file:
      - .env
    command: >
      sh -c "while true; do python manage.py expire_bubbles; sleep 60; done"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-insecure-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      POSTGRES_DB: ${POSTGRES_DB:-bubblle}
      POSTGRES_USER: ${POSTGRES_USER:-bubblle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bubblle}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-agents:
    build: .
    env_file:
      - .env
    command: python manage.py run_ai_chat_agents --base-url http://web:8000
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-insecure-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1},web
      POSTGRES_DB: ${POSTGRES_DB:-bubblle}
      POSTGRES_USER: ${POSTGRES_USER:-bubblle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bubblle}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      BUBBLLE_BASE_URL: http://web:8000
      SESSION_COOKIE_SECURE: "0"
      # Required — must exist in ~/Bubblle/.env on the server (.env is not in git)
      OPENAI_API_KEY: ${OPENAI_API_KEY:?Add OPENAI_API_KEY=sk-... to .env in project root}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    depends_on:
      web:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
